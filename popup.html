<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMT Translator</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>TMT Translator</h1>
        <p class="subtitle">English · Nepali · Tamang</p>
        <button id="darkToggle" class="dark-toggle" title="Toggle dark mode">
          🌙
        </button>
      </header>
      <main>
        <div class="lang-row">
          <select id="srcLang">
            <option value="en">English</option>
            <option value="ne">Nepali</option>
            <option value="tmg">Tamang</option>
          </select>
          <button id="swapBtn" title="Swap languages">⇄</button>
          <select id="tgtLang">
            <option value="ne">Nepali</option>
            <option value="en">English</option>
            <option value="tmg">Tamang</option>
          </select>
        </div>

        <div class="detect-row">
          <label class="detect-label">
            <input type="checkbox" id="autoDetect" />
            <span>Auto-detect source language</span>
          </label>
        </div>

        <div class="input-group">
          <textarea
            id="inputText"
            placeholder="Enter text or click 🎤 to speak..."
            rows="4"
          ></textarea>
    
          <span class="char-count" id="charCount">0 / 500</span>
        </div>  

        <button id="translateBtn" class="btn-primary">Translate</button>
        <button id="translatePageBtn" class="btn-secondary">
          🌐 Translate This Page
        </button>

       <div class="output-group">
        <div id="outputText" class="output-text" placeholder="Translation will appear here..."></div>
        <div class="output-actions">
          <button id="speakBtn" class="btn-small" title="Listen to pronunciation">🔊</button>
          <button id="copyBtn" class="btn-small" title="Copy translation">📋 Copy</button>
        </div>
      </div>
          <button id="copyBtn" class="btn-small" title="Copy translation">
            📋 Copy
          </button>
        </div>

        <div class="history-section">
          <div class="history-header">
            <span class="history-title">🕐 Recent</span>
            <button id="clearHistoryBtn" class="btn-small-inline">Clear</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>

        <a href="#" id="openSettings" class="footer-link">⚙ Settings</a>
        <span class="version-badge">v1.0.0 — Google TMT Hackathon 2026</span>
      </main>
    </div>
    <script src="scripts/detector.js"></script>
    <script src="scripts/history.js"></script>
    <script src="scripts/splitter.js"></script>
    <script src="scripts/secrets.js"></script>
    <script src="scripts/popup.js"></script>
  </body>
</html>
