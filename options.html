<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMT Translator — Settings</title>
    <link rel="stylesheet" href="styles/options.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>⚙ Settings</h1>
        <p class="subtitle">Configure your TMT API key</p>
      </header>
      <main>
        <label for="apiKeyInput">API Key</label>
        <input
          type="text"
          id="apiKeyInput"
          placeholder="team_xxxxxxxxxxxxxxxx"
          spellcheck="false"
        />
        <p class="hint">
          Your team token from the hackathon registration email.
        </p>
        <button id="saveBtn" class="btn-primary">Save Key</button>
        <div id="statusMsg" class="status-msg"></div>
      </main>
    </div>
    <script src="scripts/options.js"></script>
  </body>
</html>
